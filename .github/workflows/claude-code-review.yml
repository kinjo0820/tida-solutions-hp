name: Claude Code Review

on:
  pull_request:
    types: [opened, ready_for_review, reopened]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # 必須
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # 引用符を外すか、シングルクォートで確実に指定
          plugin_marketplaces: https://github.com/anthropics/claude-code.git
          plugins: code-review@claude-code-plugins
          prompt: |
            review-pr REPO: ${{ github.repository }}/pull/${{ github.event.pull_request.number }}
            具体的な指摘がある場合は、必ず `mcp__github_inline_comment__create_inline_comment` ツールを使用してインラインコメントを投稿してください。
          claude_args: |
            --allowed-tools "mcp__github_inline_comment__create_inline_comment"
            --dangerously-skip-permissions-confirmation